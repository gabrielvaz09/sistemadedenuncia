<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Denúncias Anônimas</title>
    <style>
        /* --- ESTILOS (CSS) --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
        }

        header {
            background: #2c3e50;
            color: #fff;
            padding: 2rem 1rem;
            text-align: center;
        }

        main {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .card {
            background: #fff;
            padding: 2rem;
            margin-bottom: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .card h2 {
            margin-bottom: 1.5rem;
            color: #2c3e50;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        input[type="text"],
        select,
        textarea,
        input[type="file"] {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 0.5rem;
        }

        .btn {
            display: inline-block;
            background: #e74c3c;
            color: #fff;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
        }

        .btn:hover { background: #c0392b; }
        .btn-secondary { background: #3498db; }
        .btn-secondary:hover { background: #2980b9; }

        .hidden { display: none; }

        .alert {
            padding: 1rem;
            border-radius: 4px;
            margin-top: 1rem;
            text-align: center;
        }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-info { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    </style>
</head>
<body>
    <header>
        <h1>Portal de Denúncias Anônimas</h1>
        <p>Faça sua denúncia com segurança, sem necessidade de identificação, de forma organizada e responsável.</p>
    </header>

    <main>
        <!-- SEÇÃO DE NOVA DENÚNCIA -->
        <section class="card">
            <h2>Registrar Nova Denúncia</h2>
            <form id="form-denuncia">
                
                <!-- Exercício 1: Categorias de denúncia -->
                <div class="form-group">
                    <label for="categoria">Categoria da Denúncia:</label>
                    <select id="categoria" required>
                        <option value="" disabled selected>Selecione uma categoria...</option>
                        
                        <optgroup label="A) Segurança e Violência">
                            <option value="Violência contra a mulher">Violência contra a mulher</option>
                            <option value="Violência contra crianças">Violência contra crianças</option>
                            <option value="Violência contra idosos">Violência contra idosos</option>
                            <option value="Furto/Roubo">Furto/Roubo</option>
                            <option value="Drogas">Drogas</option>
                            <option value="Atividade suspeita">Atividade suspeita</option>
                        </optgroup>
                        
                        <optgroup label="B) Direitos e Conduta">
                            <option value="Assédio moral/sexual">Assédio moral/sexual</option>
                            <option value="Bullying/Cyberbullying">Bullying/Cyberbullying</option>
                            <option value="Discriminação">Discriminação</option>
                            <option value="Direitos humanos">Direitos humanos</option>
                            <option value="Denúncia institucional">Denúncia institucional</option>
                        </optgroup>
                        
                        <optgroup label="C) Meio Ambiente e Bem-Estar">
                            <option value="Maus-tratos a animais">Maus-tratos a animais</option>
                            <option value="Crimes ambientais">Crimes ambientais</option>
                            <option value="Perturbação do sossego">Perturbação do sossego</option>
                            <option value="Situações de risco">Situações de risco</option>
                        </optgroup>
                        
                        <optgroup label="D) Cidade e Serviços">
                            <option value="Infraestrutura urbana">Infraestrutura urbana</option>
                            <option value="Serviços públicos">Serviços públicos</option>
                            <option value="Transporte e trânsito">Transporte e trânsito</option>
                            <option value="Irregularidades escolares">Irregularidades escolares</option>
                        </optgroup>
                    </select>
                </div>

                <!-- Exercício 2: Envio de localização -->
                <div class="form-group">
                    <label>Localização:</label>
                    <input type="text" id="bairro" placeholder="Bairro" required>
                    <input type="text" id="rua" placeholder="Rua" required>
                    <input type="text" id="referencia" placeholder="Ponto de referência">
                </div>

                <div class="form-group">
                    <label for="descricao">Descrição (Opcional):</label>
                    <textarea id="descricao" rows="4" placeholder="Descreva o ocorrido..."></textarea>
                </div>

                <!-- Exercício 3: Upload de evidência (simulado) -->
                <div class="form-group">
                    <label for="evidencia">Anexar Evidência (Imagem, Vídeo ou Documento):</label>
                    <input type="file" id="evidencia" accept="image/*,video/*,.pdf,.doc,.docx">
                </div>

                <button type="submit" class="btn">Enviar Denúncia</button>
            </form>
            
            <!-- Retorno do Exercício 4 (Protocolo Automático) -->
            <div id="resultado-protocolo" class="hidden alert alert-success">
                <h3>Denúncia enviada com sucesso!</h3>
                <p>Guarde seu número de protocolo: <strong id="numero-protocolo"></strong></p>
            </div>
        </section>

        <!-- SEÇÃO DE ACOMPANHAMENTO (Exercício 5) -->
        <section class="card">
            <h2>Acompanhamento de Status</h2>
            <form id="form-consulta">
                <div class="form-group">
                    <label for="consulta-protocolo">Número do Protocolo:</label>
                    <input type="text" id="consulta-protocolo" placeholder="Ex: PRT-12345" required>
                </div>
                <button type="submit" class="btn btn-secondary">Consultar</button>
            </form>
            <div id="resultado-consulta" class="hidden alert alert-info">
                <p>Status atual da denúncia: <strong id="status-atual"></strong></p>
            </div>
        </section>
    </main>

    <!-- --- LÓGICA (JavaScript) --- -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const formDenuncia = document.getElementById('form-denuncia');
            const formConsulta = document.getElementById('form-consulta');

            // Mapeia os status possíveis para evolução simulada
            const statusPossiveis = ["denúncia recebida", "em análise", "encaminhada", "concluída"];

            // Exercício 4: Geração do Protocolo
            function gerarProtocolo() {
                const randomNum = Math.floor(10000 + Math.random() * 90000);
                return `PRT-${randomNum}`;
            }

            formDenuncia.addEventListener('submit', (e) => {
                e.preventDefault();

                // Gera o protocolo automático
                const novoProtocolo = gerarProtocolo();

                // Monta o objeto da denúncia
                const denuncia = {
                    protocolo: novoProtocolo,
                    categoria: document.getElementById('categoria').value,
                    bairro: document.getElementById('bairro').value,
                    rua: document.getElementById('rua').value,
                    status: statusPossiveis[0], // Inicia sempre como "denúncia recebida"
                    data: new Date().toLocaleDateString('pt-BR')
                };

                // Salva no LocalStorage (simulando banco de dados)
                let denunciasSalvas = JSON.parse(localStorage.getItem('denuncias')) || [];
                denunciasSalvas.push(denuncia);
                localStorage.setItem('denuncias', JSON.stringify(denunciasSalvas));

                // Exibe o protocolo para o usuário
                document.getElementById('numero-protocolo').innerText = novoProtocolo;
                document.getElementById('resultado-protocolo').classList.remove('hidden');
                
                // Limpa o formulário
                formDenuncia.reset();
            });

            // Exercício 5: Acompanhamento de status
            formConsulta.addEventListener('submit', (e) => {
                e.preventDefault();
                
                const protocoloBuscado = document.getElementById('consulta-protocolo').value.trim().toUpperCase();
                let denunciasSalvas = JSON.parse(localStorage.getItem('denuncias')) || [];
                
                const denunciaEncontrada = denunciasSalvas.find(d => d.protocolo === protocoloBuscado);
                const divResultado = document.getElementById('resultado-consulta');
                const spanStatus = document.getElementById('status-atual');

                divResultado.classList.remove('hidden');

                if (denunciaEncontrada) {
                    spanStatus.innerText = denunciaEncontrada.status.toUpperCase();
                    divResultado.className = 'alert alert-info';
                    divResultado.style.backgroundColor = ""; // Reseta caso tenha dado erro antes
                    divResultado.style.color = "";
                } else {
                    spanStatus.innerText = "PROTOCOLO NÃO ENCONTRADO";
                    divResultado.className = 'alert alert-error';
                    divResultado.style.backgroundColor = "#f8d7da";
                    divResultado.style.color = "#721c24";
                }
            });
        });
    </script>
</body>
</html>
